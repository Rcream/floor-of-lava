<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floor of Lava Platformer</title>
    <style>
        body {  
            margin: 0; 
            background: #91b3c0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
        }count
        canvas { 
            border: 2px solid #333; 
            background: #000000;
        }
        #instructions {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            text-shadow: 1px 1px 2px black; 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div id="instructions">
        Arrows or WASD: Move/Jump | Fall off = DEAD | ENTER: Start/Select | U: Upgrades | C: Skins | R: Restart | P: Pause
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function roundedRect(ctx, x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + r);
  ctx.lineTo(x + width, y + height - r);
  ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
  ctx.lineTo(x + r, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const SKY_HEIGHT = 380;
const VISUAL_LAVA_Y = 350;
const DEATH_LAVA_Y = 400;

// Game states: 'menu', 'countdown', 'playing', 'paused', 'dead', 'upgrades', 'skins', 'levelInfo'
let gameState = 'menu';
let countdownValue = 0;
let countdownTimer = 0;

let deathCount = 0;

let score = 0;
let highScore = 0;
let coins = 0;
let currentPlatformId = null;

// jumpLevel kept for old data, but unused in physics
let jumpLevel = 0;
let coinMultiplier = 1;
let magnetLevel = 0;
let hasSecondChance = false;
let usedSecondChanceThisRun = false;

// Fixed jump force
const JUMP_FORCE = 14;

let totalXP = 0;
let playerLevel = 1;

function xpNeededForNextLevel() {
  return 50 * playerLevel;
}

function handleLevelUps() {
  while (totalXP >= xpNeededForNextLevel()) {
    totalXP -= xpNeededForNextLevel();
    playerLevel++;
    if (playerLevel === 2) {
      // previously increased jump; now cosmetic only
      jumpLevel += 1;
    } else if (playerLevel === 3) {
      baseSpeedBoost += 0.2;
    } else if (playerLevel === 4) {
      hasSecondChance = true;
    }
  }
}

function awardRunXP() {
  const runXP = score + coinsEarnedThisRun;
  totalXP += runXP;
  handleLevelUps();
}

const WORLD_SPEED_BASE = 3;
let baseSpeedBoost = 0;
let speedBoost = 0;
let platformsLandedThisRun = 0;

function currentWorldSpeed() {
  return WORLD_SPEED_BASE + baseSpeedBoost + speedBoost;
}

const player = {
  x: 200,
  y: 270,
  width: 30,
  height: 30,
  speed: 5,
  velY: 0,
  jumping: false,
  grounded: false
};

// Skins
const skins = [
  { id: 0, name: 'Default Bot', color: '#7d7d7d', cost: 0, unlocked: true },
  { id: 1, name: 'Angry Bot',   color: '#FF4444', cost: 10, unlocked: false },
  { id: 2, name: 'Dino Bot',    color: '#22AA55', cost: 10, unlocked: false },
  { id: 3, name: 'Hazmat Bot',  color: '#FFD800', cost: 10, unlocked: false },
  { id: 4, name: 'Rust Bot',  color: '#B85C2D', cost: 10, unlocked: false }
];
let selectedSkinIndex = 0;
let skinsMenuSelection = 0;
let skinsScrollOffset = 0;
const SKINS_VISIBLE_COUNT = 4;

// Fragile platforms
const BALLOON_STAND_TIME = 45;
const BALLOON_SHAKE_TIME = 20;

function makePlatform(x, y, width, moving, startX, moveRange, moveSpeed) {
  const isBalloon = Math.random() < 0.5;
  return {
    x,
    y,
    width,
    height: 20,
    moving,
    startX,
    moveRange,
    moveSpeed,
    dir: 1,
    localOffset: 0,
    prevLocalOffset: 0,
    type: isBalloon ? 'balloon' : 'normal',
    standTime: 0,
    popped: false
  };
}

const platforms = [
  {
    x: 180, y: 300, width: 150, height: 20, moving: false,
    startX: 180, moveRange: 0, moveSpeed: 0, dir: 1,
    localOffset: 0, prevLocalOffset: 0,
    type: 'balloon', standTime: 0, popped: false
  },
  {
    x: 450, y: 300, width: 100, height: 20, moving: true,
    startX: 450, moveRange: 60, moveSpeed: 1.2, dir: 1,
    localOffset: 0, prevLocalOffset: 0,
    type: 'normal', standTime: 0, popped: false
  },
  {
    x: 700, y: 280, width: 150, height: 20, moving: false,
    startX: 700, moveRange: 0, moveSpeed: 0, dir: 1,
    localOffset: 0, prevLocalOffset: 0,
    type: 'normal', standTime: 0, popped: false
  },
  {
    x: 950, y: 320, width: 120, height: 20, moving: true,
    startX: 950, moveRange: 50, moveSpeed: 1.0, dir: 1,
    localOffset: 0, prevLocalOffset: 0,
    type: 'normal', standTime: 0, popped: false
  },
  {
    x: 1200, y: 300, width: 150, height: 20, moving: false,
    startX: 1200, moveRange: 0, moveSpeed: 0, dir: 1,
    localOffset: 0, prevLocalOffset: 0,
    type: 'normal', standTime: 0, popped: false
  }
];

const coinsOnField = [];
function addCoinOnPlatform(plat) {
  coinsOnField.push({
    x: plat.x + plat.width / 2,
    y: plat.y - 12,
    radius: 8,
    active: true
  });
}
addCoinOnPlatform(platforms[1]);
addCoinOnPlatform(platforms[3]);

// Missions
const missions = [
  { type: 0, target: 15, text: 'Land on 15 platforms in one run' },
  { type: 1, target: 5, text: 'Collect 5 coins in one run' },
  { type: 2, target: 3, text: 'Reach speed level 3' }
];
let currentMissionIndex = 0;
let missionProgress = 0;
let missionComplete = false;
let missionCompleteTimer = 0;
let coinsEarnedThisRun = 0;
let missionXPEarnedThisRun = 0;

function currentMission() {
  return missions[currentMissionIndex];
}

function resetMissionForNewRun() {
  missionProgress = 0;
  missionComplete = false;
  missionCompleteTimer = 0;
  coinsEarnedThisRun = 0;
  missionXPEarnedThisRun = 0;
}

function completeMission() {
  missionComplete = true;
  missionCompleteTimer = 180;
  const missionXPBonus = 10;
  totalXP += missionXPBonus;
  missionXPEarnedThisRun += missionXPBonus;
  handleLevelUps();
}

function advanceMission() {
  currentMissionIndex = (currentMissionIndex + 1) % missions.length;
  missionProgress = 0;
  missionComplete = false;
  missionCompleteTimer = 0;
}

function updateMissionOnPlatformLand() {
  const mission = currentMission();
  if (missionComplete) return;
  if (mission.type === 0) {
    missionProgress = platformsLandedThisRun;
    if (missionProgress >= mission.target) completeMission();
  }
}

function updateMissionOnCoinsEarned() {
  const mission = currentMission();
  if (missionComplete) return;
  if (mission.type === 1) {
    missionProgress = coinsEarnedThisRun;
    if (missionProgress >= mission.target) completeMission();
  }
}

function updateMissionOnSpeed() {
  const mission = currentMission();
  if (missionComplete) return;
  if (mission.type === 2) {
    missionProgress = Math.floor(speedBoost);
    if (missionProgress >= mission.target) completeMission();
  }
}

function updateMissionsEachFrame() {
  if (missionCompleteTimer > 0) {
    missionCompleteTimer--;
    if (missionCompleteTimer === 0) advanceMission();
  }
  updateMissionOnSpeed();
}

// Screen shake & particles
let screenShakeTime = 0;
const SCREEN_SHAKE_DURATION = 20;
const SCREEN_SHAKE_INTENSITY = 5;

function startScreenShake() {
  screenShakeTime = SCREEN_SHAKE_DURATION;
}
function applyScreenShake() {
  if (screenShakeTime > 0) {
    screenShakeTime--;
    const dx = (Math.random() - 0.5) * SCREEN_SHAKE_INTENSITY;
    const dy = (Math.random() - 0.5) * SCREEN_SHAKE_INTENSITY;
    ctx.translate(dx, dy);
  }
}

const lavaSplashes = [];
function spawnLavaSplash() {
  lavaSplashes.length = 0;
  for (let i = 0; i < 20; i++) {
    lavaSplashes.push({
      x: canvas.width / 2 + (Math.random() - 0.5) * 200,
      y: DEATH_LAVA_Y - 5,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 4 - 2,
      life: 40 + Math.random() * 20
    });
  }
}
function updateLavaSplashes() {
  for (let p of lavaSplashes) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life--;
  }
  for (let i = lavaSplashes.length - 1; i >= 0; i--) {
    if (lavaSplashes[i].life <= 0) lavaSplashes.splice(i, 1);
  }
}
function drawLavaSplashes() {
  ctx.fillStyle = '#FF6347';
  for (let p of lavaSplashes) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

const coinParticles = [];
function spawnCoinParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    coinParticles.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 2,
      vy: -Math.random() * 2 - 1,
      life: 30 + Math.random() * 10
    });
  }
}
function updateCoinParticles() {
  for (let p of coinParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  }
  for (let i = coinParticles.length - 1; i >= 0; i--) {
    if (coinParticles[i].life <= 0) coinParticles.splice(i, 1);
  }
}
function drawCoinParticles() {
  ctx.fillStyle = '#FFD700';
  for (let p of coinParticles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateMagnetEffect() {
  if (magnetLevel <= 0) return;
  const magnetRadius = 80 + magnetLevel * 40;
  const pullStrength = 0.3 + magnetLevel * 0.1;
  for (let coin of coinsOnField) {
    if (!coin.active) continue;
    const dx = player.x + player.width / 2 - coin.x;
    const dy = player.y + player.height / 2 - coin.y;
    const distSq = dx * dx + dy * dy;
    const dist = Math.sqrt(distSq);
    if (dist > 0 && dist < magnetRadius) {
      const nx = dx / dist;
      const ny = dy / dist;
      coin.x += nx * pullStrength;
      coin.y += ny * pullStrength * 0.5;
    }
  }
}

function checkCoinPickup() {
  for (let coin of coinsOnField) {
    if (!coin.active) continue;
    const closestX = Math.max(player.x, Math.min(coin.x, player.x + player.width));
    const closestY = Math.max(player.y, Math.min(coin.y, player.y + player.height));
    const dx = coin.x - closestX;
    const dy = coin.y - closestY;
    if (dx * dx + dy * dy < coin.radius * coin.radius) {
      coin.active = false;
      const gained = 1 * coinMultiplier;
      coins += gained;
      coinsEarnedThisRun += gained;
      updateMissionOnCoinsEarned();
      spawnCoinParticles(coin.x, coin.y);
    }
  }
}

// Input & menu indices
const keys = {};
let mainMenuSelection = 0;
const mainMenuItems = ['Start Run', 'Upgrades', 'Skins', 'Level Info'];

let upgradesMenuSelection = 0;
const upgradesItems = ['Coin Multiplier', 'Magnet', 'Second Chance'];

let pauseMenuSelection = 0;
let deathMenuSelection = 0;

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (gameState === 'menu') {
    if (e.code === 'ArrowUp') {
      mainMenuSelection = (mainMenuSelection - 1 + mainMenuItems.length) % mainMenuItems.length;
    }
    if (e.code === 'ArrowDown') {
      mainMenuSelection = (mainMenuSelection + 1) % mainMenuItems.length;
    }
    if (e.code === 'Enter') {
      const item = mainMenuItems[mainMenuSelection];
      if (item === 'Start Run') {
        startGame();
      } else if (item === 'Upgrades') {
        upgradesMenuSelection = 0;
        gameState = 'upgrades';
      } else if (item === 'Skins') {
        skinsMenuSelection = selectedSkinIndex;
        skinsScrollOffset = Math.max(0, Math.min(skinsMenuSelection, skins.length - SKINS_VISIBLE_COUNT));
        gameState = 'skins';
      } else if (item === 'Level Info') {
        gameState = 'levelInfo';
      }
    }
    if (e.code === 'KeyU') {
      upgradesMenuSelection = 0;
      gameState = 'upgrades';
    }
    if (e.code === 'KeyC') {
      gameState = 'skins';
      skinsMenuSelection = selectedSkinIndex;
      skinsScrollOffset = Math.max(0, Math.min(skinsMenuSelection, skins.length - SKINS_VISIBLE_COUNT));
    }
  }

  if (gameState === 'levelInfo') {
    if (e.code === 'Escape') gameState = 'menu';
  }

  if (gameState === 'upgrades') {
    if (e.code === 'ArrowUp') {
      upgradesMenuSelection = (upgradesMenuSelection - 1 + upgradesItems.length) % upgradesItems.length;
    }
    if (e.code === 'ArrowDown') {
      upgradesMenuSelection = (upgradesMenuSelection + 1) % upgradesItems.length;
    }
    if (e.code === 'Enter') {
      const item = upgradesItems[upgradesMenuSelection];
      if (item === 'Coin Multiplier') {
        const cost = 20;
        if (coins >= cost && coinMultiplier < 2) {
          coins -= cost;
          coinMultiplier = 2;
        }
      } else if (item === 'Magnet') {
        const cost = 15;
        if (coins >= cost) {
          coins -= cost;
          magnetLevel += 1;
        }
      } else if (item === 'Second Chance') {
        const cost = 25;
        if (playerLevel >= 4 && coins >= cost && !hasSecondChance) {
          coins -= cost;
          hasSecondChance = true;
        }
      }
    }
    if (e.code === 'Escape') gameState = 'menu';
  }

  if (gameState === 'dead') {
    if (e.code === 'ArrowUp') {
      deathMenuSelection = (deathMenuSelection - 1 + 2) % 2;
    } else if (e.code === 'ArrowDown') {
      deathMenuSelection = (deathMenuSelection + 1) % 2;
    } else if (e.code === 'Enter') {
      if (deathMenuSelection === 0) {
        restart();
      } else {
        resetPlayerAndPlatforms();
        gameState = 'menu';
      }
    } else if (e.code === 'KeyR') {
      restart();
    }
  }

  if (gameState === 'playing' && e.code === 'KeyP') {
    pauseMenuSelection = 0;
    gameState = 'paused';
  } else if (gameState === 'paused') {
    if (e.code === 'KeyP') {
      gameState = 'playing';
    } else if (e.code === 'ArrowUp') {
      pauseMenuSelection = (pauseMenuSelection - 1 + 2) % 2;
    } else if (e.code === 'ArrowDown') {
      pauseMenuSelection = (pauseMenuSelection + 1) % 2;
    } else if (e.code === 'Enter') {
      if (pauseMenuSelection === 0) {
        gameState = 'playing';
      } else {
        resetPlayerAndPlatforms();
        gameState = 'menu';
      }
    }
  }

  if (gameState === 'skins') {
    if (e.code === 'ArrowUp') {
      if (skinsMenuSelection > 0) {
        skinsMenuSelection--;
      } else {
        skinsMenuSelection = skins.length - 1;
      }
      if (skinsMenuSelection < skinsScrollOffset) {
        skinsScrollOffset = skinsMenuSelection;
      }
    }
    if (e.code === 'ArrowDown') {
      if (skinsMenuSelection < skins.length - 1) {
        skinsMenuSelection++;
      } else {
        skinsMenuSelection = 0;
      }
      if (skinsMenuSelection >= skinsScrollOffset + SKINS_VISIBLE_COUNT) {
        skinsScrollOffset = skinsMenuSelection - SKINS_VISIBLE_COUNT + 1;
      }
    }
    if (e.code === 'Enter') {
      const skin = skins[skinsMenuSelection];
      if (skin.unlocked || coins >= skin.cost) {
        if (!skin.unlocked) {
          coins -= skin.cost;
          skin.unlocked = true;
        }
        selectedSkinIndex = skinsMenuSelection;
      }
    }
    if (e.code === 'Escape') gameState = 'menu';
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

function collides(rect1, rect2) {
  return (
    rect1.x < rect2.x + rect2.width &&
    rect1.x + rect1.width > rect2.x &&
    rect1.y < rect2.y + rect2.height &&
    rect1.y + rect1.height > rect2.y
  );
}

function resetPlayerAndPlatforms() {
  player.x = 200;
  player.y = 270;
  player.velY = 0;
  player.grounded = false;

  platforms.length = 0;
  platforms.push(
    {
      x: 180, y: 300, width: 150, height: 20, moving: false,
      startX: 180, moveRange: 0, moveSpeed: 0, dir: 1,
      localOffset: 0, prevLocalOffset: 0,
      type: 'balloon', standTime: 0, popped: false
    },
    {
      x: 450, y: 300, width: 100, height: 20, moving: true,
      startX: 450, moveRange: 60, moveSpeed: 1.2, dir: 1,
      localOffset: 0, prevLocalOffset: 0,
      type: 'normal', standTime: 0, popped: false
    },
    {
      x: 700, y: 280, width: 150, height: 20, moving: false,
      startX: 700, moveRange: 0, moveSpeed: 0, dir: 1,
      localOffset: 0, prevLocalOffset: 0,
      type: 'normal', standTime: 0, popped: false
    },
    {
      x: 950, y: 320, width: 120, height: 20, moving: true,
      startX: 950, moveRange: 50, moveSpeed: 1.0, dir: 1,
      localOffset: 0, prevLocalOffset: 0,
      type: 'normal', standTime: 0, popped: false
    },
    {
      x: 1200, y: 300, width: 150, height: 20, moving: false,
      startX: 1200, moveRange: 0, moveSpeed: 0, dir: 1,
      localOffset: 0, prevLocalOffset: 0,
      type: 'normal', standTime: 0, popped: false
    }
  );

  coinsOnField.length = 0;
  addCoinOnPlatform(platforms[1]);
  addCoinOnPlatform(platforms[3]);

  score = 0;
  currentPlatformId = null;
  platformsLandedThisRun = 0;
  speedBoost = 0;
  coinsEarnedThisRun = 0;
  usedSecondChanceThisRun = false;
  screenShakeTime = 0;
  lavaSplashes.length = 0;
  coinParticles.length = 0;
  resetMissionForNewRun();
}

function startGame() {
  resetPlayerAndPlatforms();
  countdownValue = 3;
  countdownTimer = 60;
  gameState = 'countdown';
}

function restart() {
  resetPlayerAndPlatforms();
  countdownValue = 3;
  countdownTimer = 60;
  gameState = 'countdown';
}

function spawnPlatform() {
  const last = platforms[platforms.length - 1];
  const gapMin = 80;
  const gapMax = 180;
  const gap = gapMin + Math.random() * (gapMax - gapMin);
  const newX = last.x + last.width + gap;
  const possibleHeights = [320, 300, 280, 260];
  const y = possibleHeights[Math.floor(Math.random() * possibleHeights.length)];
  const width = 80 + Math.random() * 100;
  const isMoving = Math.random() < 0.25;
  const plat = makePlatform(
    newX,
    y,
    width,
    isMoving,
    newX,
    isMoving ? 60 : 0,
    isMoving ? 1.2 : 0
  );
  platforms.push(plat);
  if (Math.random() < 0.4) addCoinOnPlatform(plat);
}

function update() {
  if (gameState === 'countdown') {
    countdownTimer--;
    if (countdownTimer <= 0) {
      countdownValue--;
      if (countdownValue > 0) {
        countdownTimer = 60;
      } else {
        gameState = 'playing';
      }
    }
    return;
  }

  if (gameState !== 'playing') return;

  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;

  if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW']) && player.grounded) {
    player.velY = -JUMP_FORCE;
    player.jumping = true;
    player.grounded = false;
  }

  if (player.x < 50) player.x = 50;
  if (player.x + player.width > canvas.width - 50) {
    player.x = canvas.width - 50 - player.width;
  }

  player.velY += 0.8;
  player.y += player.velY;

  const speed = currentWorldSpeed();
  for (let plat of platforms) {
    plat.x -= speed;
    if (plat.moving) {
      plat.localOffset += plat.moveSpeed * plat.dir;
      if (plat.localOffset > plat.moveRange || plat.localOffset < -plat.moveRange) {
        plat.dir *= -1;
      }
      const delta = plat.localOffset - plat.prevLocalOffset;
      plat.x += delta;
      plat.prevLocalOffset = plat.localOffset;
    }
  }

  for (let coin of coinsOnField) {
    coin.x -= speed;
  }

  updateMagnetEffect();

  while (platforms.length && platforms[0].x + platforms[0].width < -50) {
    platforms.shift();
    spawnPlatform();
  }

  let landedThisFrame = false;
  let landedPlatformIndex = null;
  let landedPlatform = null;
  player.grounded = false;

  for (let i = 0; i < platforms.length; i++) {
    const plat = platforms[i];
    if (plat.type === 'balloon' && plat.popped) continue;
    const feetJustEntered =
      player.velY > 0 &&
      player.y + player.height <= plat.y + plat.height &&
      player.y + player.height >= plat.y;

    if (collides(player, plat) && feetJustEntered) {
      player.y = plat.y - player.height;
      player.velY = 0;
      player.grounded = true;
      player.jumping = false;
      landedThisFrame = true;
      landedPlatformIndex = i;
      landedPlatform = plat;
      break;
    }
  }

  if (landedThisFrame && landedPlatform && landedPlatform.type === 'balloon' && !landedPlatform.popped) {
    landedPlatform.standTime++;
    if (landedPlatform.standTime >= BALLOON_STAND_TIME) {
      landedPlatform.popped = true;
      player.grounded = false;
      player.velY = 2;
    }
  }

  if (!landedThisFrame) {
    for (let plat of platforms) {
      if (plat.type === 'balloon' && !plat.popped) {
        plat.standTime = 0;
      }
    }
  }

  if (landedThisFrame) {
    if (currentPlatformId === null || currentPlatformId !== landedPlatformIndex) {
      score++;
      currentPlatformId = landedPlatformIndex;
      platformsLandedThisRun++;
      updateMissionOnPlatformLand();
      if (platformsLandedThisRun % 10 === 0) {
        speedBoost += 0.2;
      }
    }
  } else {
    currentPlatformId = null;
  }

  checkCoinPickup();

  if (player.y + player.height > DEATH_LAVA_Y) {
    if (hasSecondChance && !usedSecondChanceThisRun) {
      usedSecondChanceThisRun = true;
      const lost = Math.min(coins, 3);
      coins -= lost;
      player.y = DEATH_LAVA_Y - player.height - 20;
      player.velY = -15;
      player.grounded = false;
      startScreenShake();
      spawnLavaSplash();
    } else {
      if (score > highScore) {
        highScore = score;
      }
      awardRunXP();
      gameState = 'dead';
      deathCount++;
      startScreenShake();
      spawnLavaSplash();
    }
  }

  updateLavaSplashes();
  updateCoinParticles();
  updateMissionsEachFrame();
}

// DARK CONVEYOR HALL BACKGROUND + NEW LAVA
function drawBackgroundAndPlatforms() {
  // Dark industrial background
  ctx.fillStyle = '#14161c';
  ctx.fillRect(0, 0, canvas.width, SKY_HEIGHT);

  // Far background diagonal conveyors
  ctx.strokeStyle = '#262a33';
  ctx.lineWidth = 10;
  for (let i = -200; i < canvas.width + 200; i += 220) {
    ctx.beginPath();
    ctx.moveTo(i, SKY_HEIGHT - 260);
    ctx.lineTo(i + 260, SKY_HEIGHT - 80);
    ctx.stroke();
  }

  // Mid background conveyors
  ctx.strokeStyle = '#323643';
  ctx.lineWidth = 14;
  for (let i = -250; i < canvas.width + 250; i += 260) {
    ctx.beginPath();
    ctx.moveTo(i + 260, SKY_HEIGHT - 220);
    ctx.lineTo(i, SKY_HEIGHT - 40);
    ctx.stroke();
  }

  // Horizontal conveyors
  ctx.strokeStyle = '#3b404d';
  ctx.lineWidth = 12;
  const beltYs = [SKY_HEIGHT - 190, SKY_HEIGHT - 140, SKY_HEIGHT - 90];
  for (let y of beltYs) {
    ctx.beginPath();
    ctx.moveTo(-100, y);
    ctx.lineTo(canvas.width + 100, y);
    ctx.stroke();
  }

  // Belt rollers
  ctx.fillStyle = '#1f222a';
  for (let x = -40; x < canvas.width + 40; x += 80) {
    ctx.beginPath();
    ctx.arc(x, SKY_HEIGHT - 190, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 40, SKY_HEIGHT - 140, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vertical support beams
  ctx.fillStyle = '#20242d';
  for (let i = 40; i < canvas.width; i += 160) {
    ctx.fillRect(i, SKY_HEIGHT - 260, 10, 260);
  }

  // Warning stripes on beams
  ctx.save();
  ctx.fillStyle = '#ffcc33';
  for (let i = 40; i < canvas.width; i += 320) {
    for (let y = SKY_HEIGHT - 80; y < SKY_HEIGHT; y += 16) {
      ctx.save();
      ctx.translate(i, y);
      ctx.rotate(-Math.PI / 6);
      ctx.fillRect(-8, -4, 24, 8);
      ctx.restore();
    }
  }
  ctx.restore();

  // Foreground pipes
  ctx.fillStyle = '#323643';
  for (let i = 60; i < canvas.width; i += 220) {
    ctx.fillRect(i, SKY_HEIGHT - 40, 14, 40);
    ctx.fillRect(i - 12, SKY_HEIGHT - 42, 38, 6);
  }

  // Top ledge above lava
  ctx.fillStyle = '#3b3f48';
  ctx.fillRect(0, SKY_HEIGHT, canvas.width, 15);

  // Base lava
  ctx.fillStyle = '#FF4500';
  ctx.fillRect(0, VISUAL_LAVA_Y, canvas.width, canvas.height - VISUAL_LAVA_Y);

  // Dark crust band
  ctx.fillStyle = '#992300';
  ctx.fillRect(0, VISUAL_LAVA_Y, canvas.width, 10);

  // Hot inner glow band
  ctx.fillStyle = '#FF7A1A';
  for (let i = 0; i < canvas.width; i += 30) {
    ctx.beginPath();
    const waveY =
      VISUAL_LAVA_Y + 8 + Math.sin(i * 0.03 + Date.now() * 0.002) * 3;
    ctx.arc(i, waveY, 10, 0, Math.PI * 2);
    ctx.fill();
  }

  // Deeper red band just below
  ctx.fillStyle = '#CC3300';
  for (let i = 15; i < canvas.width; i += 35) {
    ctx.beginPath();
    const waveY =
      VISUAL_LAVA_Y + 18 + Math.cos(i * 0.025 + Date.now() * 0.0015) * 3;
    ctx.arc(i, waveY, 9, 0, Math.PI * 2);
    ctx.fill();
  }

  // Platforms
  for (let plat of platforms) {
    if (plat.type === 'balloon') {
      if (plat.popped) continue;

      const shakePhase = Math.max(0, plat.standTime - (BALLOON_STAND_TIME - BALLOON_SHAKE_TIME));
      const shakeAmount = shakePhase > 0 ? 2 : 0;
      const sx = shakeAmount ? (Math.random() - 0.5) * shakeAmount : 0;
      const sy = shakeAmount ? (Math.random() - 0.5) * shakeAmount : 0;

      const x = plat.x + sx;
      const y = plat.y + sy;

      // fragile metal base
      ctx.fillStyle = '#30333c';
      ctx.fillRect(x, y, plat.width, plat.height);

      // hazard stripe band
      ctx.fillStyle = '#ffcc33';
      ctx.fillRect(x, y + plat.height - 5, plat.width, 5);
      ctx.fillStyle = '#20242d';
      for (let i = 0; i < plat.width; i += 10) {
        ctx.beginPath();
        ctx.moveTo(x + i, y + plat.height);
        ctx.lineTo(x + i + 6, y + plat.height - 5);
        ctx.lineTo(x + i + 10, y + plat.height - 5);
        ctx.lineTo(x + i + 4, y + plat.height);
        ctx.closePath();
        ctx.fill();
      }

      // crack lines (extra)
      ctx.strokeStyle = '#50545f';
      ctx.lineWidth = 1;

      // main left crack
      ctx.beginPath();
      ctx.moveTo(x + 6, y + 4);
      ctx.lineTo(x + 18, y + 8);
      ctx.lineTo(x + 26, y + 5);
      ctx.stroke();

      // main right crack
      ctx.beginPath();
      ctx.moveTo(x + plat.width - 24, y + 3);
      ctx.lineTo(x + plat.width - 12, y + 8);
      ctx.stroke();

      // extra small cracks
      ctx.beginPath();
      ctx.moveTo(x + plat.width * 0.3, y + 3);
      ctx.lineTo(x + plat.width * 0.3 + 6, y + 7);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + plat.width * 0.55, y + 5);
      ctx.lineTo(x + plat.width * 0.55 + 5, y + 9);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + plat.width * 0.7, y + 2);
      ctx.lineTo(x + plat.width * 0.7 + 7, y + 6);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x + plat.width * 0.15, y + 7);
      ctx.lineTo(x + plat.width * 0.15 + 5, y + 11);
      ctx.stroke();
    } else {
      // solid version: same but no cracks
      const x = plat.x;
      const y = plat.y;

      ctx.fillStyle = '#30333c';
      ctx.fillRect(x, y, plat.width, plat.height);

      ctx.fillStyle = '#ffcc33';
      ctx.fillRect(x, y + plat.height - 5, plat.width, 5);
      ctx.fillStyle = '#20242d';
      for (let i = 0; i < plat.width; i += 10) {
        ctx.beginPath();
        ctx.moveTo(x + i, y + plat.height);
        ctx.lineTo(x + i + 6, y + plat.height - 5);
        ctx.lineTo(x + i + 10, y + plat.height - 5);
        ctx.lineTo(x + i + 4, y + plat.height);
        ctx.closePath();
        ctx.fill();
      }
    }
  }
}

function drawCoins() {
  ctx.fillStyle = '#FFD700';
  for (let coin of coinsOnField) {
    if (!coin.active) continue;
    ctx.beginPath();
    ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#FFA500';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  roundedRect(ctx, 5, 5, 190, 90, 8);
  ctx.fill();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('Score: ' + score, 10, 10);
  ctx.fillText('High: ' + highScore, 10, 35);

  const xpBarWidth = 170;
  const xpBarHeight = 10;
  const xpBarX = 10;
  const xpBarY = 80;
  const neededXP = xpNeededForNextLevel();
  const xpProgress = neededXP > 0 ? Math.min(totalXP / neededXP, 1) : 0;

  ctx.font = '12px sans-serif';
  ctx.fillText(`Lvl ${playerLevel} XP: ${totalXP}/${neededXP}`, xpBarX, xpBarY - 12);

  ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
  roundedRect(ctx, xpBarX, xpBarY, xpBarWidth, xpBarHeight, 5);
  ctx.fill();

  // XP fill matches mission bar green
  ctx.fillStyle = '#4CAF50';
  roundedRect(ctx, xpBarX, xpBarY, xpBarWidth * xpProgress, xpBarHeight, 5);
  ctx.fill();

  const boxWidth = 180;
  const boxHeight = 40;
  const boxX = canvas.width - boxWidth - 5;
  const boxY = 5;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  roundedRect(ctx, boxX, boxY, boxWidth, boxHeight, 8);
  ctx.fill();

  const coinX = boxX + 18;
  const coinY = boxY + boxHeight / 2;

  ctx.beginPath();
  ctx.fillStyle = '#FFD700';
  ctx.arc(coinX, coinY, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#FFA500';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('x ' + coins, coinX + 15, coinY);

  const mission = currentMission();
  const barWidth = 320;
  const barHeight = 16;
  const barX = canvas.width / 2 - barWidth / 2;
  const barY = 65;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  roundedRect(ctx, barX, barY, barWidth, barHeight, 8);
  ctx.fill();

  let progress = 0;
  if (mission.target > 0) {
    progress = Math.min(missionProgress / mission.target, 1);
  }

  ctx.fillStyle = '#4CAF50';
  roundedRect(ctx, barX, barY, barWidth * progress, barHeight, 8);
  ctx.fill();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(mission.text, canvas.width / 2, barY - 2);

  if (missionCompleteTimer > 0) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    roundedRect(ctx, canvas.width / 2 - 160, barY + 22, 320, 30, 8);
    ctx.fill();
    ctx.fillStyle = '#00FF00';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('MISSION COMPLETE!', canvas.width / 2, barY + 37);
  }

  let stateLabel = '';
  if (gameState === 'playing') stateLabel = 'RUNNING';
  else if (gameState === 'paused') stateLabel = 'PAUSED';
  else if (gameState === 'upgrades') stateLabel = 'UPGRADES';
  else if (gameState === 'skins') stateLabel = 'SKINS';
  else if (gameState === 'dead') stateLabel = 'DEAD';
  else if (gameState === 'menu') stateLabel = 'MENU';
  else if (gameState === 'levelInfo') stateLabel = 'LEVEL INFO';
  else if (gameState === 'countdown') stateLabel = 'READY';

  if (stateLabel) {
    const labelWidth = 120;
    const labelHeight = 24;
    const labelX = canvas.width / 2 - labelWidth / 2;
    const labelY = 5;
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    roundedRect(ctx, labelX, labelY, labelWidth, labelHeight, 10);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stateLabel, canvas.width / 2, labelY + labelHeight / 2);
  }
}

  const startIndex = skinsScrollOffset;
  const endIndex = Math.min(skins.length, skinsScrollOffset + SKINS_VISIBLE_COUNT);

  for (let i = startIndex; i < endIndex; i++) {
    const skin = skins[i];
    const row = i - startIndex;
    const y = startY + row * lineHeight;

    if (i === skinsMenuSelection) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      roundedRect(ctx, canvas.width / 2 - 200, y - 25, 400, 50, 10);
      ctx.fill();
    }

    ctx.fillStyle = skin.color;
    roundedRect(ctx, canvas.width / 2 - 180, y - 18, 36, 36, 6);
    ctx.fill();

    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const status = skin.unlocked
      ? i === selectedSkinIndex
        ? '(Equipped)'
        : '(Owned)'
      : `(Cost: ${skin.cost})`;
    ctx.fillText(`${skin.name} ${status}`, canvas.width / 2 - 130, y);
  }

  if (skinsScrollOffset > 0) {
    ctx.fillStyle = '#CCCCCC';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▲ more skins', canvas.width / 2, startY - 20);
  }
  if (skinsScrollOffset + SKINS_VISIBLE_COUNT < skins.length) {
    ctx.fillStyle = '#CCCCCC';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▼ more skins', canvas.width / 2, startY + SKINS_VISIBLE_COUNT * lineHeight);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#CCCCCC';
  ctx.font = '18px sans-serif';
  ctx.fillText(
    'Arrow Up/Down: Scroll | ENTER: Buy/Equip | ESC: Back',
    canvas.width / 2,
    canvas.height - 40
  );
}

function drawCountdownOverlay() {
  if (gameState !== 'countdown') return;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'white';
  ctx.font = '80px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const text = countdownValue > 0 ? countdownValue.toString() : 'GO!';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  applyScreenShake();

  drawBackgroundAndPlatforms();
  drawCoins();
  drawLavaSplashes();
  drawCoinParticles();
  drawHUD();
  drawPlayerAndWarnings();

  if (gameState === 'menu') {
    drawMenu();
  } else if (gameState === 'paused') {
    drawPauseMenu();
  } else if (gameState === 'upgrades') {
    drawUpgradesMenu();
  } else if (gameState === 'skins') {
    drawSkinsMenu();
  } else if (gameState === 'dead') {
    drawDeathScreen();
  } else if (gameState === 'levelInfo') {
    drawLevelInfoMenu();
  } else if (gameState === 'countdown') {
    drawCountdownOverlay();
  }

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

resetMissionForNewRun();
gameLoop();
</script>
